name: Feature Request
description: Suggest a DSA tracker feature, enhancement, or new problem area
labels: ["gssoc", "gssoc:approved", "level:intermediate", "type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the feature or DSA tracker improvement you would like to add.

  - type: input
    id: feature_title
    attributes:
      label: Feature Title
      placeholder: e.g., Add public user profile badges
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What user or contributor pain point does this solve?
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected Area
      options:
        - DSA topic or question tracking
        - Profile or authentication
        - Leaderboard or progress stats
        - Search or filters
        - UI templates or styling
        - Tests or CI
    validations:
      required: true

  - type: textarea
    id: technical_details
    attributes:
      label: Proposed Implementation
      description: Describe expected files, routes, templates, tests, or data changes.
    validations:
      required: false
