{% extends "base.html" %}
{% block content %}
<style>
.search-shell { max-width: 980px; }
.search-head { margin-bottom: 20px; }
.search-title { font-size: 1.6rem; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
.search-sub { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
.search-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 18px;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 0 12px;
  transition: all 0.2s;
}
.search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,0.12); }
.search-box i { color: var(--text-muted); font-size: 1rem; }
.search-input {
  width: 100%;
  min-height: 46px;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-primary);
  font: inherit;
  font-size: 0.95rem;
}
.search-input:focus-visible {
  outline: none;
}
.clear-btn {
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.clear-btn:hover { color: var(--accent); background: rgba(255,107,0,0.08); }
.clear-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.platform-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.platform-chip {
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.platform-chip:hover,
.platform-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(255,107,0,0.08); }
.platform-chip:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.search-meta {
  color: var(--text-secondary);
  font-size: 0.82rem;
  margin: 0 0 10px;
  min-height: 20px;
}
.result-list { display: grid; gap: 10px; }
.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  transition: border-color 0.2s;
}
.result-card:hover { border-color: var(--accent); }
.result-card:focus-within {
  border-color: var(--accent);
  outline: none;
}
.result-topic {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  margin-bottom: 6px;
  padding: 2px 9px;
  border-radius: 999px;
  background: rgba(99,102,241,0.12);
  color: #818cf8;
  border: 1px solid rgba(99,102,241,0.22);
  font-size: 0.72rem;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.2s;
}
.result-topic:hover,
.result-topic:focus-visible {
  background: rgba(99,102,241,0.2);
  color: #a5b4fc;
  text-decoration: none;
}
.result-name { color: var(--text-primary); font-size: 0.95rem; font-weight: 750; margin-bottom: 8px; }
.link-row { display: flex; flex-wrap: wrap; gap: 6px; }
.q-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.73rem;
  font-weight: 700;
  text-decoration: none;
  transition: opacity 0.2s;
}
.q-badge:hover { opacity: 0.86; text-decoration: none; }
.q-badge:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.badge-lc { background: rgba(255,184,0,0.15); color: #ffb800; border: 1px solid rgba(255,184,0,0.25); }
.badge-gfg { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
.badge-cn { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
.badge-hr { background: rgba(0,189,108,0.15); color: #00bd6c; border: 1px solid rgba(0,189,108,0.25); }
.badge-link { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.25); }
.result-actions { display: flex; align-items: flex-start; gap: 8px; }
.topic-open {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  background: transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: all 0.2s;
}
.topic-open:hover,
.topic-open:focus-visible { color: var(--accent); border-color: var(--accent); text-decoration: none; }
.empty-search {
  background: var(--bg-card);
  border: 1px dashed var(--border-color);
  border-radius: 14px;
  padding: 42px 18px;
  text-align: center;
  color: var(--text-secondary);
}
.empty-search i { display: block; color: var(--text-muted); font-size: 2.3rem; margin-bottom: 10px; }
@media (max-width: 720px) {
  .result-card { grid-template-columns: 1fr; }
  .result-actions { justify-content: flex-start; }
}
</style>

<div class="search-shell">
  <div class="search-head">
    <div class="search-title"><i class="bi bi-search" style="color:var(--accent)" aria-hidden="true"></i> Search</div>
    <div class="search-sub">Find 450 DSA questions and jump to matching platform searches.</div>
  </div>

  <div class="search-panel">
    <div class="search-box" role="search">
      <i class="bi bi-search" aria-hidden="true"></i>
      <label for="searchInput" class="visually-hidden">Search questions</label>
      <input id="searchInput" class="search-input" value="{{ initial_query }}" autocomplete="off" autofocus
        placeholder="Search arrays, kadane, lc two sum, gfg graph, cn dp..."
        aria-label="Search DSA questions by problem name, topic, or platform" 
        aria-controls="results" 
        aria-describedby="searchMeta"
        aria-autocomplete="list">
      <button id="clearSearch" class="clear-btn" type="button" aria-label="Clear search input">
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>
    <div class="platform-row" role="group" aria-label="Filter search results by coding platform">
      <button class="platform-chip" type="button" data-token="" aria-label="Show all platforms">All</button>
      <button class="platform-chip" type="button" data-token="leetcode" aria-label="Filter to LeetCode only">LeetCode</button>
      <button class="platform-chip" type="button" data-token="gfg" aria-label="Filter to GeeksForGeeks only">GFG</button>
      <button class="platform-chip" type="button" data-token="cn" aria-label="Filter to Coding Ninjas only">Coding Ninjas</button>
      <button class="platform-chip" type="button" data-token="hackerrank" aria-label="Filter to HackerRank only">HackerRank</button>
    </div>
  </div>

  <div id="searchMeta" class="search-meta" role="status" aria-live="polite" aria-atomic="true"></div>
  <div id="results" class="result-list" role="list" aria-label="Search results"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const endpointConfig = {{ {
  "searchQuestions": url_for('search.api_search_questions'),
}|tojson }};
const input = document.getElementById('searchInput');
const results = document.getElementById('results');
const meta = document.getElementById('searchMeta');
const clearBtn = document.getElementById('clearSearch');
const chips = document.querySelectorAll('.platform-chip');
let activeToken = '';
let debounceTimer = null;
let controller = null;
const platformLabels = {
  leetcode: 'LeetCode',
  gfg: 'GFG',
  cn: 'Coding Ninjas',
  hackerrank: 'HackerRank'
};

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function badgeClass(color) {
  if (color === 'lc') return 'badge-lc';
  if (color === 'gfg') return 'badge-gfg';
  if (color === 'cn') return 'badge-cn';
  if (color === 'hr') return 'badge-hr';
  return 'badge-link';
}

function currentQuery() {
  const text = input.value.trim();
  return [activeToken, text].filter(Boolean).join(' ');
}

function setActiveChip(token) {
  activeToken = token;
  chips.forEach(chip => {
    const isActive = chip.dataset.token === token;
    chip.classList.toggle('active', isActive);
    chip.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
}

function renderEmpty(icon, text) {
  results.innerHTML = `<div class="empty-search" role="status"><i class="bi ${icon}" aria-hidden="true"></i><p>${escapeHtml(text)}</p></div>`;
}

function renderPlatformPrompt() {
  const platform = platformLabels[activeToken] || 'selected platform';
  meta.textContent = `${platform} filter selected`;
  renderEmpty('bi-search-heart', `Type a search term to find ${platform} practice links.`);
}

function renderResults(payload) {
  const count = payload.results.length;
  const platforms = payload.requested_platforms || [];
  meta.textContent = count ? `${count} result${count === 1 ? '' : 's'}${platforms.length ? ' with ' + platforms.join(', ') : ''}` : '';

  if (!input.value.trim()) {
    if (activeToken) {
      renderPlatformPrompt();
      return;
    }

    meta.textContent = '';
    renderEmpty('bi-search', 'Start typing to search the DSA sheet.');
    return;
  }

  if (!count) {
    const external = (payload.external_searches || []).map(link =>
      `<a class="q-badge ${badgeClass(link.color)}" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" aria-label="Search ${escapeHtml(link.platform)} for your query (opens new tab)">
        <i class="bi bi-box-arrow-up-right" aria-hidden="true"></i>${escapeHtml(link.platform)}
      </a>`
    ).join('');
    results.innerHTML = `<div class="empty-search"><i class="bi bi-search-heart" aria-hidden="true"></i><p>No sheet match found.</p><div class="link-row" style="justify-content:center">${external}</div></div>`;
    return;
  }

  results.innerHTML = payload.results.map(item => {
    const directLinks = (item.links || []).map(link =>
      `<a class="q-badge ${badgeClass(link.color)}" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" aria-label="View on ${escapeHtml(link.platform)} (opens new tab)">
        <i class="bi bi-box-arrow-up-right" aria-hidden="true"></i>${escapeHtml(link.platform)}
      </a>`
    ).join('');
    const platformSearches = (item.external_searches || []).map(link =>
      `<a class="q-badge ${badgeClass(link.color)}" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" aria-label="Search ${escapeHtml(link.platform)} for this problem (opens new tab)">
        <i class="bi bi-search" aria-hidden="true"></i>${escapeHtml(link.platform)}
      </a>`
    ).join('');
    const topicUrl = `/topic/${encodeURIComponent(item.topic_id)}`;

    return `
      <article class="result-card" role="listitem">
        <div>
          <a href="${topicUrl}" class="result-topic" aria-label="Go to ${escapeHtml(item.topic)} topic page">${escapeHtml(item.topic)}</a>
          <div class="result-name">${escapeHtml(item.problem)}</div>
          <div class="link-row">${directLinks}${platformSearches}</div>
        </div>
        <div class="result-actions">
          <a class="topic-open" href="${topicUrl}" title="Open topic" aria-label="Go to ${escapeHtml(item.topic)} topic">
            <i class="bi bi-arrow-right" aria-hidden="true"></i>
          </a>
        </div>
      </article>`;
  }).join('');
}

async function runSearch() {
  const query = currentQuery();
  if (controller) controller.abort();

  if (!input.value.trim()) {
    if (activeToken) {
      renderPlatformPrompt();
      return;
    }

    meta.textContent = '';
    renderEmpty('bi-search', 'Start typing to search the DSA sheet.');
    return;
  }

  controller = new AbortController();
  meta.textContent = 'Searching...';
  meta.setAttribute('aria-busy', 'true');

  try {
    const res = await fetch(`${endpointConfig.searchQuestions}?q=${encodeURIComponent(query)}`, { signal: controller.signal });
    renderResults(await res.json());
    meta.setAttribute('aria-busy', 'false');
  } catch (err) {
    if (err.name !== 'AbortError') {
      meta.textContent = '';
      meta.setAttribute('aria-busy', 'false');
      renderEmpty('bi-wifi-off', 'Search failed. Please try again.');
    }
  }
}

function scheduleSearch() {
  window.clearTimeout(debounceTimer);
  debounceTimer = window.setTimeout(runSearch, 180);
}

input.addEventListener('input', scheduleSearch);
clearBtn.addEventListener('click', () => {
  input.value = '';
  input.focus();
  scheduleSearch();
});
chips.forEach(chip => {
  chip.addEventListener('click', () => {
    setActiveChip(chip.dataset.token);
    runSearch();
  });
  // Allow keyboard Enter/Space to activate chip
  chip.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      setActiveChip(chip.dataset.token);
      runSearch();
    }
  });
  chip.setAttribute('role', 'button');
  chip.setAttribute('aria-pressed', 'false');
});

setActiveChip('');
runSearch();
</script>
{% endblock %}
